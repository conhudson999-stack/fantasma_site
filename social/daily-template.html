<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <title>Fantasma Football — Daily Post</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: 'Outfit', sans-serif;
    }

    .slide {
      width: 1080px;
      height: 1080px;
      position: relative;
      overflow: hidden;
    }

    /* ── Base layout for all variants ── */
    .slide-inner {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* ── Navy background (default) ── */
    .bg-navy {
      background: #040C14;
    }

    .bg-navy::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 40%, rgba(197, 179, 88, 0.06) 0%, transparent 60%);
      pointer-events: none;
    }

    /* ── Cream background ── */
    .bg-cream {
      background: #F8F7F4;
    }

    /* ── Corner marks ── */
    .corner {
      position: absolute;
      width: 40px;
      height: 40px;
      z-index: 10;
    }
    .corner::before, .corner::after {
      content: '';
      position: absolute;
      background: rgba(197, 179, 88, 0.25);
    }
    .corner-tl { top: 48px; left: 48px; }
    .corner-tl::before { top: 0; left: 0; width: 40px; height: 1px; }
    .corner-tl::after { top: 0; left: 0; width: 1px; height: 40px; }
    .corner-tr { top: 48px; right: 48px; }
    .corner-tr::before { top: 0; right: 0; width: 40px; height: 1px; }
    .corner-tr::after { top: 0; right: 0; width: 1px; height: 40px; }
    .corner-bl { bottom: 48px; left: 48px; }
    .corner-bl::before { bottom: 0; left: 0; width: 40px; height: 1px; }
    .corner-bl::after { bottom: 0; left: 0; width: 1px; height: 40px; }
    .corner-br { bottom: 48px; right: 48px; }
    .corner-br::before { bottom: 0; right: 0; width: 40px; height: 1px; }
    .corner-br::after { bottom: 0; right: 0; width: 1px; height: 40px; }

    /* ── Scan lines overlay ── */
    .scanlines::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.03) 2px,
        rgba(0, 0, 0, 0.03) 4px
      );
      pointer-events: none;
      z-index: 5;
    }

    /* ── Grain texture ── */
    .grain::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 128px;
      pointer-events: none;
      z-index: 4;
    }

    /* ── Typography ── */
    .headline {
      font-family: 'Bebas Neue', sans-serif;
      line-height: 0.9;
      letter-spacing: 4px;
      position: relative;
      z-index: 2;
    }

    .headline-xl { font-size: 120px; }
    .headline-lg { font-size: 96px; }
    .headline-md { font-size: 72px; }

    .body-text {
      font-family: 'Outfit', sans-serif;
      font-weight: 300;
      font-size: 18px;
      line-height: 1.6;
      letter-spacing: 1px;
      position: relative;
      z-index: 2;
    }

    .label {
      font-family: 'Outfit', sans-serif;
      font-weight: 400;
      font-size: 14px;
      letter-spacing: 6px;
      text-transform: uppercase;
      position: relative;
      z-index: 2;
    }

    .text-white { color: #FFFFFF; }
    .text-gold { color: #C5B358; }
    .text-cream { color: #F8F7F4; }
    .text-navy { color: #040C14; }
    .text-muted { color: rgba(255, 255, 255, 0.5); }
    .text-muted-dark { color: rgba(10, 10, 10, 0.5); }

    /* ── Accent elements ── */
    .gold-bar {
      width: 48px;
      height: 3px;
      background: #C5B358;
      position: relative;
      z-index: 2;
    }

    .gold-bar-vertical {
      width: 4px;
      height: 36px;
      background: #C5B358;
      position: relative;
      z-index: 2;
    }

    /* ── Watermark ── */
    .watermark {
      position: absolute;
      bottom: 48px;
      left: 0;
      right: 0;
      text-align: center;
      font-family: 'Outfit', sans-serif;
      font-weight: 300;
      font-size: 13px;
      letter-spacing: 4px;
      color: rgba(255, 255, 255, 0.2);
      z-index: 10;
    }

    .watermark.dark {
      color: rgba(10, 10, 10, 0.2);
    }

    /* ══════════════════════════════════════════════════════════════
       VARIANT: stat-highlight
       Big stat number with context line
    ══════════════════════════════════════════════════════════════ */
    .layout-stat {
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 80px;
      gap: 24px;
    }

    .stat-number {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 200px;
      line-height: 0.85;
      letter-spacing: 6px;
      color: #C5B358;
      position: relative;
      z-index: 2;
    }

    .stat-suffix {
      font-size: 120px;
      color: rgba(197, 179, 88, 0.6);
    }

    /* ══════════════════════════════════════════════════════════════
       VARIANT: training-tip
       Numbered drill / tip format
    ══════════════════════════════════════════════════════════════ */
    .layout-tip {
      padding: 100px 80px;
      gap: 32px;
    }

    .tip-number {
      font-family: 'Outfit', sans-serif;
      font-weight: 300;
      font-size: 13px;
      letter-spacing: 6px;
      color: rgba(197, 179, 88, 0.5);
      position: relative;
      z-index: 2;
    }

    .tip-steps {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-top: 16px;
      position: relative;
      z-index: 2;
    }

    .tip-step {
      display: flex;
      align-items: flex-start;
      gap: 16px;
    }

    .step-marker {
      width: 4px;
      height: 4px;
      min-width: 4px;
      background: #C5B358;
      border-radius: 50%;
      margin-top: 10px;
    }

    .step-text {
      font-family: 'Outfit', sans-serif;
      font-weight: 300;
      font-size: 20px;
      color: rgba(255, 255, 255, 0.7);
      letter-spacing: 1px;
      line-height: 1.4;
    }

    /* ══════════════════════════════════════════════════════════════
       VARIANT: quote / motivation
       Centered bold quote with attribution
    ══════════════════════════════════════════════════════════════ */
    .layout-quote {
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 100px;
      gap: 40px;
    }

    .quote-marks {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 120px;
      color: rgba(197, 179, 88, 0.15);
      line-height: 0.5;
      position: relative;
      z-index: 2;
    }

    .quote-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 80px;
      line-height: 0.95;
      letter-spacing: 3px;
      color: #FFFFFF;
      position: relative;
      z-index: 2;
    }

    .quote-attr {
      font-family: 'Outfit', sans-serif;
      font-weight: 300;
      font-size: 14px;
      letter-spacing: 4px;
      color: rgba(197, 179, 88, 0.6);
      text-transform: uppercase;
      position: relative;
      z-index: 2;
    }

    /* ══════════════════════════════════════════════════════════════
       VARIANT: local-callout
       Location-focused announcement
    ══════════════════════════════════════════════════════════════ */
    .layout-callout {
      padding: 100px 80px;
      justify-content: center;
      gap: 32px;
    }

    .callout-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border: 1px solid rgba(197, 179, 88, 0.3);
      border-radius: 4px;
      align-self: flex-start;
      position: relative;
      z-index: 2;
    }

    .callout-badge-dot {
      width: 6px;
      height: 6px;
      background: #C5B358;
      border-radius: 50%;
    }

    .callout-badge-text {
      font-family: 'Outfit', sans-serif;
      font-weight: 500;
      font-size: 12px;
      letter-spacing: 3px;
      color: #C5B358;
      text-transform: uppercase;
    }

    /* ══════════════════════════════════════════════════════════════
       VARIANT: data-blocks
       Grid of data points
    ══════════════════════════════════════════════════════════════ */
    .layout-data {
      padding: 80px;
      gap: 40px;
    }

    .data-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      position: relative;
      z-index: 2;
    }

    .data-block {
      padding: 32px;
      background: rgba(197, 179, 88, 0.04);
      border: 1px solid rgba(197, 179, 88, 0.1);
      border-radius: 8px;
    }

    .data-value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 56px;
      color: #C5B358;
      letter-spacing: 2px;
      line-height: 1;
    }

    .data-label {
      font-family: 'Outfit', sans-serif;
      font-weight: 300;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 8px;
    }

    /* ══════════════════════════════════════════════════════════════
       VARIANT: cta (call-to-action)
       Strong booking / action prompt
    ══════════════════════════════════════════════════════════════ */
    .layout-cta {
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 100px;
      gap: 40px;
    }

    .cta-button {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 16px 40px;
      border: 2px solid #C5B358;
      border-radius: 0;
      background: transparent;
      position: relative;
      z-index: 2;
    }

    .cta-button-text {
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      font-size: 16px;
      letter-spacing: 4px;
      color: #C5B358;
      text-transform: uppercase;
    }

    .cta-arrow {
      font-size: 18px;
      color: #C5B358;
    }

    /* ══════════════════════════════════════════════════════════════
       THEME OVERLAY ELEMENTS (always in HTML, styled per theme)
    ══════════════════════════════════════════════════════════════ */
    .theme-glow, .theme-grain, .theme-scanlines {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .theme-decor, .theme-decor-2 {
      position: absolute;
      pointer-events: none;
    }

    /* ══════════════════════════════════════════════════════════════
       THEME: Dark Phantom
       Navy bg · gold radial glow · scanlines · grain · gold circles
    ══════════════════════════════════════════════════════════════ */
    .theme-dark {
      background: #040C14;
    }
    .theme-dark .theme-glow {
      background: radial-gradient(ellipse at 50% 35%, rgba(197,179,88,0.07) 0%, transparent 55%);
      z-index: 0;
    }
    .theme-dark .theme-grain {
      opacity: 0.04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 128px;
      z-index: 4;
    }
    .theme-dark .theme-scanlines {
      background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);
      z-index: 5;
    }
    .theme-dark .theme-decor {
      width: 500px; height: 500px;
      border: 2px solid rgba(197,179,88,0.08);
      border-radius: 50%;
      bottom: -100px; right: -80px;
      z-index: 1;
    }
    .theme-dark .theme-decor-2 {
      width: 300px; height: 300px;
      border: 1px solid rgba(197,179,88,0.05);
      border-radius: 50%;
      bottom: 0; right: 20px;
      z-index: 1;
    }
    .theme-dark .corner { display: block; }
    .theme-dark .corner::before,
    .theme-dark .corner::after { background: rgba(197,179,88,0.25); }
    .theme-dark .headline { color: #FFFFFF; }
    .theme-dark .label { color: #C5B358; }
    .theme-dark .body-text { color: rgba(255,255,255,0.5); }
    .theme-dark .stat-number { color: #C5B358; }
    .theme-dark .stat-suffix { color: rgba(197,179,88,0.6); }
    .theme-dark .gold-bar { background: #C5B358; }
    .theme-dark .watermark { color: rgba(255,255,255,0.2); }
    .theme-dark .tip-number { color: rgba(197,179,88,0.5); }
    .theme-dark .step-marker { background: #C5B358; }
    .theme-dark .step-text { color: rgba(255,255,255,0.7); }
    .theme-dark .quote-marks { color: rgba(197,179,88,0.15); }
    .theme-dark .quote-text { color: #FFFFFF; }
    .theme-dark .quote-attr { color: rgba(197,179,88,0.6); }
    .theme-dark .callout-badge { border-color: rgba(197,179,88,0.3); }
    .theme-dark .callout-badge-dot { background: #C5B358; }
    .theme-dark .callout-badge-text { color: #C5B358; }
    .theme-dark .data-block { background: rgba(197,179,88,0.04); border-color: rgba(197,179,88,0.1); }
    .theme-dark .data-value { color: #C5B358; }
    .theme-dark .data-label { color: rgba(255,255,255,0.5); }
    .theme-dark .cta-button { border-color: #C5B358; }
    .theme-dark .cta-button-text { color: #C5B358; }
    .theme-dark .cta-arrow { color: #C5B358; }

    /* ══════════════════════════════════════════════════════════════
       THEME: Cream Editorial
       Cream bg · gold left sidebar · faint circle · clean / no texture
    ══════════════════════════════════════════════════════════════ */
    .theme-cream {
      background: #F8F7F4;
    }
    .theme-cream .theme-glow { display: none; }
    .theme-cream .theme-grain { display: none; }
    .theme-cream .theme-scanlines { display: none; }
    .theme-cream .theme-decor {
      width: 8px; height: 100%;
      background: #C5B358;
      top: 0; left: 0;
      z-index: 10;
    }
    .theme-cream .theme-decor-2 {
      width: 450px; height: 450px;
      border: 50px solid rgba(4,12,20,0.025);
      border-radius: 50%;
      top: -140px; right: -120px;
      z-index: 0;
    }
    .theme-cream .corner { display: none; }
    .theme-cream .headline { color: #040C14; }
    .theme-cream .label { color: #9A8A3D; }
    .theme-cream .body-text { color: rgba(4,12,20,0.55); }
    .theme-cream .stat-number { color: #040C14; }
    .theme-cream .stat-suffix { color: rgba(4,12,20,0.3); }
    .theme-cream .gold-bar { background: #C5B358; }
    .theme-cream .watermark { color: rgba(4,12,20,0.12); }
    .theme-cream .tip-number { color: #9A8A3D; }
    .theme-cream .step-marker { background: #C5B358; }
    .theme-cream .step-text { color: rgba(4,12,20,0.65); }
    .theme-cream .quote-marks { color: rgba(197,179,88,0.25); }
    .theme-cream .quote-text { color: #040C14; }
    .theme-cream .quote-attr { color: #9A8A3D; }
    .theme-cream .callout-badge { border-color: rgba(4,12,20,0.15); }
    .theme-cream .callout-badge-dot { background: #C5B358; }
    .theme-cream .callout-badge-text { color: #9A8A3D; }
    .theme-cream .data-block { background: rgba(4,12,20,0.035); border-color: rgba(4,12,20,0.08); }
    .theme-cream .data-value { color: #040C14; }
    .theme-cream .data-label { color: rgba(4,12,20,0.45); }
    .theme-cream .cta-button { border-color: #040C14; border-width: 2px; }
    .theme-cream .cta-button-text { color: #040C14; }
    .theme-cream .cta-arrow { color: #040C14; }

    /* ══════════════════════════════════════════════════════════════
       THEME: Gold Blitz
       Black bg · diagonal gold stripes · gold borders · heavy glow
    ══════════════════════════════════════════════════════════════ */
    .theme-bold {
      background: #0A0A0A;
      border-top: 5px solid #C5B358;
      border-bottom: 5px solid #C5B358;
    }
    .theme-bold .theme-glow {
      background: radial-gradient(ellipse at 20% 80%, rgba(197,179,88,0.12) 0%, transparent 50%);
      z-index: 0;
    }
    .theme-bold .theme-grain {
      opacity: 0.06;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 128px;
      z-index: 4;
    }
    .theme-bold .theme-scanlines { display: none; }
    .theme-bold .theme-decor {
      width: 200px; height: 160%;
      background: rgba(197,179,88,0.06);
      transform: rotate(-20deg);
      top: -30%; left: 80px;
      z-index: 1;
    }
    .theme-bold .theme-decor-2 {
      width: 120px; height: 160%;
      background: rgba(197,179,88,0.03);
      transform: rotate(-20deg);
      top: -30%; left: 340px;
      z-index: 1;
    }
    .theme-bold .corner { display: none; }
    .theme-bold .headline { color: #FFFFFF; }
    .theme-bold .label { color: #C5B358; }
    .theme-bold .body-text { color: rgba(255,255,255,0.6); }
    .theme-bold .stat-number { color: #C5B358; font-size: 240px; }
    .theme-bold .stat-suffix { color: rgba(197,179,88,0.5); }
    .theme-bold .gold-bar { background: #C5B358; width: 80px; height: 4px; }
    .theme-bold .watermark { color: rgba(197,179,88,0.15); }
    .theme-bold .tip-number { color: rgba(197,179,88,0.5); }
    .theme-bold .step-marker { background: #C5B358; width: 6px; height: 6px; }
    .theme-bold .step-text { color: rgba(255,255,255,0.75); font-size: 22px; }
    .theme-bold .quote-marks { color: rgba(197,179,88,0.25); }
    .theme-bold .quote-text { color: #FFFFFF; font-size: 88px; }
    .theme-bold .quote-attr { color: rgba(197,179,88,0.7); }
    .theme-bold .callout-badge { border-color: #C5B358; background: rgba(197,179,88,0.1); }
    .theme-bold .callout-badge-dot { background: #C5B358; }
    .theme-bold .callout-badge-text { color: #C5B358; }
    .theme-bold .data-block { background: rgba(197,179,88,0.06); border-color: rgba(197,179,88,0.15); }
    .theme-bold .data-value { color: #C5B358; font-size: 64px; }
    .theme-bold .data-label { color: rgba(255,255,255,0.5); }
    .theme-bold .cta-button { border-color: #C5B358; background: rgba(197,179,88,0.1); }
    .theme-bold .cta-button-text { color: #C5B358; }
    .theme-bold .cta-arrow { color: #C5B358; }
  </style>
</head>
<body>

<div class="slide">
  <div class="slide-inner theme-bold layout-callout">
    <div class="theme-glow"></div>
    <div class="theme-grain"></div>
    <div class="theme-scanlines"></div>
    <div class="theme-decor"></div>
    <div class="theme-decor-2"></div>
    <div class="corner corner-tl"></div><div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div><div class="corner corner-br"></div>
    
    <div class="callout-badge">
      <div class="callout-badge-dot"></div>
      <div class="callout-badge-text">PITTSBURGH</div>
    </div>
    <div class="headline headline-xl">NORTH SIDE TALENT RISING</div>
    <div class="gold-bar"></div>
    <div class="body-text">From the streets of Allegheny to the pitch, our players turn grit into goals every single week.</div>
    <div class="watermark">@FANTASMAFOOTBALL</div>
  </div>
</div>
</body>
</html>
