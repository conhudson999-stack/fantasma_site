<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080">
  <title>Fantasma Post — The Phantom Doesn't Rest</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: 'Outfit', sans-serif;
    }

    .slide {
      width: 1080px;
      height: 1080px;
      position: relative;
      overflow: hidden;
      background: #F8F7F4;
    }

    /* Gradient depth — dark bottom-right corner fading to cream */
    .slide::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 25% 25%, rgba(197, 179, 88, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 100% 100%, rgba(4, 12, 20, 0.12) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 0%, rgba(4, 12, 20, 0.06) 0%, transparent 40%);
      pointer-events: none;
    }

    /* Scan lines — lighter for cream bg */
    .slide::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.015) 2px,
        rgba(0, 0, 0, 0.015) 4px
      );
      pointer-events: none;
      z-index: 5;
    }

    /* Grain */
    .grain {
      position: absolute;
      inset: 0;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 128px;
      pointer-events: none;
      z-index: 4;
    }

    /* Corner marks — darker for cream bg */
    .corner {
      position: absolute;
      width: 40px;
      height: 40px;
      z-index: 10;
    }
    .corner::before, .corner::after {
      content: '';
      position: absolute;
      background: rgba(4, 12, 20, 0.18);
    }
    .corner-tl { top: 48px; left: 48px; }
    .corner-tl::before { top: 0; left: 0; width: 40px; height: 1px; }
    .corner-tl::after { top: 0; left: 0; width: 1px; height: 40px; }
    .corner-tr { top: 48px; right: 48px; }
    .corner-tr::before { top: 0; right: 0; width: 40px; height: 1px; }
    .corner-tr::after { top: 0; right: 0; width: 1px; height: 40px; }
    .corner-bl { bottom: 48px; left: 48px; }
    .corner-bl::before { bottom: 0; left: 0; width: 40px; height: 1px; }
    .corner-bl::after { bottom: 0; left: 0; width: 1px; height: 40px; }
    .corner-br { bottom: 48px; right: 48px; }
    .corner-br::before { bottom: 0; right: 0; width: 40px; height: 1px; }
    .corner-br::after { bottom: 0; right: 0; width: 1px; height: 40px; }

    /* Large ghost watermark text */
    .ghost-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 300px;
      letter-spacing: 20px;
      color: rgba(4, 12, 20, 0.04);
      white-space: nowrap;
      z-index: 1;
      user-select: none;
    }

    /* Vertical accent lines */
    .accent-line {
      position: absolute;
      top: 0;
      left: 180px;
      width: 2px;
      height: 280px;
      background: linear-gradient(180deg, rgba(197, 179, 88, 0.5), transparent);
      z-index: 2;
    }

    .accent-line-2 {
      position: absolute;
      bottom: 0;
      right: 200px;
      width: 2px;
      height: 220px;
      background: linear-gradient(0deg, rgba(197, 179, 88, 0.3), transparent);
      z-index: 2;
    }

    /* Gold vertical bar accent */
    .gold-accent-bar {
      position: absolute;
      left: 68px;
      top: 50%;
      transform: translateY(-50%);
      width: 4px;
      height: 200px;
      background: linear-gradient(180deg, transparent, #C5B358, transparent);
      z-index: 3;
    }

    /* Content layout — left aligned editorial */
    .content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 120px 100px;
      z-index: 3;
    }

    /* Top label with gold dot */
    .label {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: 'Outfit', sans-serif;
      font-weight: 500;
      font-size: 13px;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: rgba(197, 179, 88, 0.7);
      margin-bottom: 40px;
    }

    .label-dot {
      width: 6px;
      height: 6px;
      background: #C5B358;
      border-radius: 50%;
    }

    /* Headline — staggered sizing */
    .headline-line {
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: 5px;
      line-height: 0.88;
    }

    .line-the {
      font-size: 72px;
      color: rgba(4, 12, 20, 0.5);
    }

    .line-phantom {
      font-size: 148px;
      color: #040C14;
    }

    .line-doesnt {
      font-size: 100px;
      color: rgba(4, 12, 20, 0.75);
    }

    .line-rest {
      font-size: 160px;
      color: #C5B358;
    }

    /* Bottom section */
    .bottom {
      position: absolute;
      bottom: 80px;
      left: 100px;
      right: 100px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      z-index: 10;
    }

    .body-text {
      font-family: 'Outfit', sans-serif;
      font-weight: 300;
      font-size: 17px;
      line-height: 1.8;
      letter-spacing: 1.5px;
      color: rgba(4, 12, 20, 0.5);
      max-width: 400px;
    }

    .watermark {
      font-family: 'Outfit', sans-serif;
      font-weight: 400;
      font-size: 12px;
      letter-spacing: 4px;
      color: rgba(4, 12, 20, 0.35);
      text-align: right;
    }

    .site-url {
      font-family: 'Outfit', sans-serif;
      font-weight: 400;
      font-size: 11px;
      letter-spacing: 3px;
      color: rgba(197, 179, 88, 0.5);
      text-transform: uppercase;
      margin-top: 6px;
      text-align: right;
    }
  </style>
</head>
<body>

<div class="slide">
  <div class="grain"></div>
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <!-- Background elements -->
  <div class="ghost-text">FANTASMA</div>
  <div class="accent-line"></div>
  <div class="accent-line-2"></div>
  <div class="gold-accent-bar"></div>

  <!-- Main content -->
  <div class="content">
    <div class="label">
      <div class="label-dot"></div>
      Monday Awaits
    </div>
    <div class="headline-line line-the">THE</div>
    <div class="headline-line line-phantom">PHANTOM</div>
    <div class="headline-line line-doesnt">DOESN'T</div>
    <div class="headline-line line-rest">REST.</div>
  </div>

  <!-- Bottom bar -->
  <div class="bottom">
    <div class="body-text">
      New week. Same standard.<br>
      Set the tone before the sun comes up.
    </div>
    <div>
      <div class="watermark">@FANTASMAFOOTBALL</div>
      <div class="site-url">fantasmafootball.com</div>
    </div>
  </div>
</div>

</body>
</html>
